<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ChemEasy PRO</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e3a8a);
    color: white;
    text-align: center;
    margin: 0;
}

.container {
    max-width: 420px;
    margin: 40px auto;
    background: rgba(255,255,255,0.05);
    padding: 25px;
    border-radius: 20px;
    backdrop-filter: blur(10px);
}

h1 { margin-bottom: 5px; }

input, select {
    width: 90%;
    padding: 12px;
    margin: 8px;
    border-radius: 10px;
    border: none;
}

button {
    width: 95%;
    padding: 15px;
    border-radius: 10px;
    border: none;
    background: #22c55e;
    color: white;
    font-size: 16px;
    cursor: pointer;
}

.resultado {
    margin-top: 15px;
    padding: 15px;
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
}

.explicacion {
    margin-top: 10px;
    font-size: 13px;
    opacity: 0.8;
}
</style>
</head>

<body>

<div class="container">

<h1>🧪 ChemEasy PRO</h1>
<p>Estequiometría simplificada</p>

<input id="masaA" placeholder="Masa Reactivo A (g)">
<input id="masaB" placeholder="Masa Reactivo B (g)">

<input id="mmA" placeholder="Masa molar A (g/mol)">
<input id="mmB" placeholder="Masa molar B (g/mol)">

<select id="tipo">
    <option value="limitante">Reactivo limitante</option>
    <option value="exceso">Reactivo en exceso</option>
    <option value="rendimiento">Rendimiento (%)</option>
    <option value="pureza">Pureza (%)</option>
</select>

<button onclick="calcular()">Calcular</button>

<div class="resultado" id="res">Resultado aparecerá aquí</div>
<div class="explicacion" id="exp"></div>

</div>

<script>
function calcular(){

let mA = parseFloat(document.getElementById("masaA").value);
let mB = parseFloat(document.getElementById("masaB").value);
let mmA_val = parseFloat(document.getElementById("mmA").value);
let mmB_val = parseFloat(document.getElementById("mmB").value);
let tipo = document.getElementById("tipo").value;

if(isNaN(mA)||isNaN(mB)||isNaN(mmA_val)||isNaN(mmB_val)){
    document.getElementById("res").innerHTML="⚠️ Completa todos los datos correctamente";
    document.getElementById("exp").innerHTML="";
    return;
}

// conversión a moles
let nA = mA/mmA_val;
let nB = mB/mmB_val;

let resultado="";
let explicacion="";

if(tipo==="limitante"){
    if(nA<nB){
        resultado="🔬 Reactivo A es LIMITANTE";
    }else{
        resultado="🔬 Reactivo B es LIMITANTE";
    }
    explicacion="Se comparan los moles de cada reactivo. El que tiene menor cantidad se consume primero.";
}

if(tipo==="exceso"){
    if(nA>nB){
        resultado="⚗️ Reactivo A está en EXCESO";
    }else{
        resultado="⚗️ Reactivo B está en EXCESO";
    }
    explicacion="El reactivo con mayor cantidad de moles queda sobrante.";
}

if(tipo==="rendimiento"){
    let rend = (Math.min(nA,nB)/Math.max(nA,nB))*100;
    resultado="📊 Rendimiento: "+rend.toFixed(2)+"%";
    explicacion="Rendimiento = (cantidad real / cantidad teórica) × 100.";
}

if(tipo==="pureza"){
    let pureza = (mA/(mA+mB))*100;
    resultado="🧪 Pureza: "+pureza.toFixed(2)+"%";
    explicacion="Pureza = (masa del componente / masa total) × 100.";
}

document.getElementById("res").innerHTML=resultado;
document.getElementById("exp").innerHTML=explicacion;

}
</script>

</body>
</html>
